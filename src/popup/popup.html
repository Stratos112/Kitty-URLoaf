<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kitty URLoaf</title>
  <style>
    body {
      width: 180px;
      padding: 16px;
      font-family: sans-serif;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    label { font-size: 14px; font-weight: 600; cursor: pointer; }
    .toggle {
      position: relative;
      width: 42px;
      height: 24px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #4c9; }
    input:checked + .slider::before { transform: translateX(18px); }
  </style>
</head>
<body>
  <label for="toggle">Enabled</label>
  <label class="toggle">
    <input type="checkbox" id="toggle">
    <span class="slider"></span>
  </label>
  <script src="popup.js"></script>
</body>
</html>
