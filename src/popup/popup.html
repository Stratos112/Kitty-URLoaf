<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kitty URLoaf</title>
  <style>
    :root {
      --bg:      #120a0f;
      --surface: #1f0d18;
      --deep:    #2d1220;
      --pink:    #ff44bb;
      --pink-lo: #8c1f4e;
      --glow:    rgba(255,68,187,0.22);
      --text:    #ffd6ec;
      --muted:   #7a5568;
      --spring:  cubic-bezier(0.34,1.56,0.64,1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      background:
        radial-gradient(ellipse at 50% -10%, rgba(255,68,187,0.13) 0%, transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* header */
    .w-head {
      text-align: center;
      padding: 22px 20px 10px;
    }
    .w-head h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.2px; }
    .w-head p  { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* dots */
    .dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      padding-bottom: 12px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 99px;
      background: var(--deep);
      transition: all 0.35s var(--spring);
      flex-shrink: 0;
    }
    .dot.on {
      width: 20px;
      background: var(--pink);
      box-shadow: 0 0 8px var(--glow);
    }

    /* slide track */
    .clip { overflow: hidden; }
    .track {
      display: flex;
      transition: transform 0.42s var(--spring);
      will-change: transform;
    }
    .page {
      width: 300px;
      flex-shrink: 0;
      padding: 0 18px 20px;
      height: 268px;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .page::-webkit-scrollbar { display: none; }

    /* download box */
    .dl-box {
      background: var(--surface);
      border: 1px solid rgba(255,68,187,0.14);
      border-radius: 18px;
      padding: 26px 20px;
      text-align: center;
      margin-bottom: 14px;
      box-shadow: inset 0 1px 0 rgba(255,68,187,0.08);
    }
    .dl-box .ico  { font-size: 42px; line-height: 1; }
    .dl-box .lbl  { font-size: 13px; font-weight: 700; margin-top: 10px; }
    .dl-box .sub  { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* steps */
    .step-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 14px;
    }
    .bullets { display: flex; flex-direction: column; gap: 11px; margin-bottom: 16px; }
    .bullet  { display: flex; gap: 9px; align-items: flex-start; font-size: 12px; line-height: 1.6; }
    .bdot    { color: var(--pink); font-size: 15px; flex-shrink: 0; line-height: 1.5; }
    .bullet code {
      background: var(--deep); border-radius: 4px; padding: 1px 5px;
      font-size: 10.5px; color: var(--pink); font-family: monospace;
    }
    .bullet b { color: #fff; }

    /* done */
    .done {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 10px;
      padding: 8px 0 16px;
    }
    .done .big { font-size: 54px; line-height: 1; }
    .done h2   { font-size: 20px; font-weight: 800; }
    .done p    { font-size: 12px; color: var(--muted); line-height: 1.65; }

    /* buttons */
    .row { display: flex; justify-content: flex-end; align-items: center; gap: 8px; }
    .row.c { justify-content: center; }
    .btn {
      border: none;
      border-radius: 99px;
      padding: 9px 20px;
      font-size: 12.5px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.18s var(--spring);
    }
    .p {
      background: linear-gradient(135deg, var(--pink) 0%, var(--pink-lo) 120%);
      color: #fff;
      box-shadow: 0 3px 14px var(--glow);
    }
    .p:hover  { transform: translateY(-2px) scale(1.04); box-shadow: 0 6px 22px var(--glow); }
    .p:active { transform: scale(0.97); }
    .p:disabled { opacity: 0.28; pointer-events: none; }
    .g { background: transparent; color: var(--muted); }
    .g:hover { color: var(--text); }
    .lnk {
      background: none; border: none; padding: 0;
      color: var(--pink); font-size: inherit; font-family: inherit;
      font-weight: 600; cursor: pointer;
      text-decoration: underline; text-underline-offset: 2px;
    }
  </style>
</head>
<body>

<!-- WIZARD -->
<div id="wizard">
  <div class="w-head">
    <h1>🐾 kitty urloaf</h1>
    <p>let's get you set up~</p>
  </div>
  <div class="dots">
    <span class="dot on" id="d0"></span>
    <span class="dot"    id="d1"></span>
    <span class="dot"    id="d2"></span>
    <span class="dot"    id="d3"></span>
    <span class="dot"    id="d4"></span>
  </div>
  <div class="clip">
    <div class="track" id="track">

      <!-- page 0: download -->
      <div class="page">
        <div class="dl-box">
          <div class="ico">🎀</div>
          <div class="lbl">userChrome.css</div>
          <div class="sub">your plushy toolbar magic~</div>
        </div>
        <div class="row">
          <button class="btn p" id="dlBtn">download ↓</button>
        </div>
        <div style="text-align:center;margin-top:8px">
          <button class="lnk" id="skipDl">i already have it</button>
        </div>
      </div>

      <!-- page 3: step 1 -->
      <div class="page">
        <p class="step-label">step 1</p>
        <div class="bullets" id="steps-a"></div>
        <div class="row">
          <button class="btn g" id="back3">← back</button>
          <button class="btn p" id="next3">next →</button>
        </div>
      </div>

      <!-- page 4: step 2 -->
      <div class="page">
        <p class="step-label">step 2</p>
        <div class="bullets" id="steps-b"></div>
        <div class="row">
          <button class="btn g" id="back4">← back</button>
          <button class="btn p" id="next4">next →</button>
        </div>
      </div>

      <!-- page 5: step 3 -->
      <div class="page">
        <p class="step-label">step 3</p>
        <div class="bullets" id="steps-c"></div>
        <div class="row">
          <button class="btn g" id="back5">← back</button>
          <button class="btn p" id="next5">next →</button>
        </div>
      </div>

      <!-- page 5: done -->
      <div class="page">
        <div class="done">
          <div class="big">🐾</div>
          <h2>Meow</h2>
          <button class="btn p" id="startOverBtn" style="margin-top:6px">start over ↩</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
