<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    body { width: 100%; height: 100vh; overflow: hidden; background: #fff; }
    #bg {
      width: 100%; height: 100%;
      background: url('../../static/plus.svg') repeat;
      background-size: 60px 60px;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <div id="bg"></div>
  <script>
    const bg = document.getElementById("bg");
    chrome.storage.local.get({ enabled: true }, ({ enabled }) => { bg.style.opacity = enabled ? "0.12" : "0"; });
    chrome.storage.onChanged.addListener(({ enabled }) => { if (enabled) bg.style.opacity = enabled.newValue ? "0.12" : "0"; });
  </script>
</body>
</html>
