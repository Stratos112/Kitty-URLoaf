<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kitty URLoaf Options</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #f4f4f4 url('../../static/plus.svg') repeat;
      background-size: 60px 60px;
      display: grid; place-items: center;
      font-family: sans-serif;
    }
    .card {
      background: white; border-radius: 10px;
      padding: 32px 40px; text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
    }
    .card img { width: 72px; height: 72px; opacity: 0.7; }
    .card h1 { margin-top: 12px; font-size: 18px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <img src="../../static/plus.svg" alt="+">
    <h1>Kitty URLoaf</h1>
  </div>
</body>
</html>
